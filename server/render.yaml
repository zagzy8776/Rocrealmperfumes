services:
  - type: web
    name: roc-realm-perfume-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
